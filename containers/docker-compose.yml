version: '3.8'

services:
  default:
    build:
      context: ..
      dockerfile: containers/Dockerfile
    image: casjaysdev/scripts:latest
    container_name: casjaysdev-scripts-default
    privileged: true
    tty: true
    stdin_open: true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-c", "setupmgr --version || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - scripts-network

  alma:
    build:
      context: ..
      dockerfile: containers/Dockerfile.alma
    image: casjaysdev/scripts:alma
